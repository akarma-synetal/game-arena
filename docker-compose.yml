services:
  db:
    image: postgres:16-alpine
    container_name: gaming_arena_db
    environment:
      POSTGRES_DB: gaming_arena
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gaming_arena"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gaming_arena_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gaming_arena_app
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "5001:5000"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  drizzle:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gaming_arena_drizzle
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "db:push"]
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
